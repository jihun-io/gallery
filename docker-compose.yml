version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: gallery-postgres
    restart: unless-stopped

    ports:
      - "54322:5432"

    environment:
      - POSTGRES_DB=gallery
      - POSTGRES_USER=jihunio
      - POSTGRES_PASSWORD=ASdZQgEChovkjdpnAdGzn7da

    volumes:
      # PostgreSQL data persistence
      - ./postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jihunio -d gallery"]
      interval: 10s
      timeout: 5s
      retries: 5

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  gallery:
    image: ghcr.io/jihun-io/gallery:latest
    container_name: gallery-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "3001:3001"

    env_file:
      - .env.production

    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOSTNAME=0.0.0.0
      - PM2_HOME=/app/logs/.pm2
      - AUTH_TRUST_HOST=true

    volumes:
      # PM2 logs
      - ./logs:/app/logs

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Memory limit (Synology compatible)
    mem_limit: 1024m
    mem_reservation: 512m

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
